<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProtoPCB</title>

  <link rel="icon" type="image/png" href="./favicon.png">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    body {
      font-family: Helvetica, Arial, sans-serif;
      background: white;
      color: #222;
      margin: 0;
    }

    .container {
      width: 700px;
      margin-left: 75px;
      margin-top: 475px;
    }

    h1 {
      font-size: 148px;
      margin: 0;
      font-weight: 700;
    }

    .subtitle {
      font-size: 20px;
      color: #666;
      margin-top: 22px;
      margin-bottom: 40px;
    }

    .icons {
      display: flex;
      gap: 28px;
      align-items: center;
    }

    .icons a {
      color: #111;
      font-size: 44px;
      text-decoration: none;
    }

    .icons a:hover {
      opacity: 0.6;
    }

    .launch-btn {
      display: inline-block;
      background: #111;
      color: #fff;
      font-size: 20px;
      padding: 14px 36px;
      border-radius: 6px;
      text-decoration: none;
    }

    .launch-btn:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div id="particles-js"></div>
  <div class="container">
    <h1>ProtoPCB</h1>
    <p class="subtitle">Prototype sustainably.</p>
    <a class="launch-btn" href="app/">Launch the app</a>
  </div>

  <!-- keep this -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
